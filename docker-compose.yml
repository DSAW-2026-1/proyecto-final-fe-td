version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unisabana_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: unisabana
      POSTGRES_PASSWORD: unisabana123
      POSTGRES_DB: marketplace
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: unisabana_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://unisabana:unisabana123@postgres:5432/marketplace
      JWT_SECRET: super_secret_jwt_key_change_in_production
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: unisabana_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
